name: picflow
description: "PicFlow - 灵感相框，治愈系排版工具"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  image_picker: ^1.1.2
  exif: ^3.3.0
  share_plus: ^9.0.0
  google_fonts: ^6.2.1
  path_provider: ^2.1.4
  image_gallery_saver: ^2.0.3
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
