spring:
  datasource:
    url: jdbc:mysql://localhost:3307/picflow?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root123456
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123456

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: test-jwt-secret-key-for-local-dev-only-min-32-chars
  expiration: 604800000

picflow:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:8080
  upload:
    path: ./uploads
    max-size: 10MB

logging:
  level:
    com.picflow: debug
